<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Agent – AI Job Matching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12; --surface: #13131d; --card: #1a1a26; --card-hover: #222233;
      --border: #1e1e30; --border-focus: #a78bfa; --text: #ededf4;
      --text-muted: #8888a0; --text-dim: #5a5a72; --accent: #a78bfa;
      --accent-soft: #a78bfa14; --accent-glow: #a78bfa40; --green: #34d399;
      --green-soft: #34d39918; --amber: #fbbf24; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::selection { background: var(--accent-glow); }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:0.5;transform:scale(1.3); } }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
    .fade-d1 { animation-delay: 0.05s; } .fade-d2 { animation-delay: 0.1s; }
    .fade-d3 { animation-delay: 0.15s; } .fade-d4 { animation-delay: 0.2s; }
    input:focus, textarea:focus { border-color: var(--border-focus) !important; outline: none; }
    .tag { display:inline-flex; align-items:center; padding:3px 10px; border-radius:6px; font-size:10.5px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; }
    .btn { border:none; border-radius:10px; cursor:pointer; font-family:inherit; font-weight:600; transition:all 0.2s; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .input { width:100%; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; transition:border-color 0.2s; outline:none; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; }
    .label { font-size:10px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
    .screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .nav-btn { display:flex; align-items:center; gap:6px; padding:7px 16px; border:none; border-radius:8px; cursor:pointer; font-size:12.5px; font-weight:500; transition:all 0.2s; font-family:inherit; background:transparent; color:var(--text-dim); }
    .nav-btn.active { background:var(--accent-soft); color:var(--accent); }
    .grid-bg { position:fixed; inset:0; z-index:0; opacity:0.03; background-image:linear-gradient(#a78bfa 1px,transparent 1px),linear-gradient(90deg,#a78bfa 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
    .match-card { border-radius:16px; padding:22px 24px; cursor:pointer; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); background:var(--surface); border:1px solid var(--border); }
    .match-card:hover { background:var(--card-hover); border-color:var(--border-focus); transform:translateY(-2px); box-shadow:0 8px 30px rgba(167,139,250,0.06); }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px 20px; flex:1; min-width:140px; position:relative; overflow:hidden; }
    .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-box { width:100%; max-width:580px; max-height:85vh; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:20px; box-shadow:0 24px 80px rgba(0,0,0,0.5); }
    .drop-zone { width:100%; min-height:180px; padding:28px; border:2px dashed var(--border); border-radius:14px; cursor:pointer; text-align:center; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:var(--surface); }
    .drop-zone.active { border-color:var(--accent); background:var(--accent-soft); }
    .drop-zone.has-file { border-color:#34d399; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API = window.location.origin + '/api';

    async function api(path, opts = {}) {
      const token = localStorage.getItem('ja_token');
      const res = await fetch(API + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...opts.headers },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Request failed: ' + res.status); }
      return res.json();
    }

    async function apiUpload(path, formData) {
      const token = localStorage.getItem('ja_token');
      const res = await fetch(API + path, {
        method: 'POST',
        headers: { ...(token ? { Authorization: 'Bearer ' + token } : {}) },
        body: formData,
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Upload failed: ' + res.status); }
      return res.json();
    }

    function Tag({ children, color = '#a78bfa', ghost }) {
      return <span className="tag" style={{ background: ghost ? 'transparent' : color+'14', color, border: '1px solid '+color+(ghost?'40':'25') }}>{children}</span>;
    }

    function ScoreRing({ score, size = 44 }) {
      const color = score >= 90 ? '#34d399' : score >= 80 ? '#a78bfa' : score >= 70 ? '#fbbf24' : '#6b7280';
      const r = (size-6)/2, circ = 2*Math.PI*r, offset = circ-(score/110)*circ;
      return (
        <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
          <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e2e" strokeWidth="3"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="3" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition:'stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)' }}/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color }}>{score}</div>
        </div>
      );
    }

    function timeAgo(d) { if(!d) return ''; const h=Math.floor((Date.now()-new Date(d).getTime())/3600000); return h<1?'Just now':h<24?h+'h ago':Math.floor(h/24)+'d ago'; }

    // ── AUTH ──
    function AuthScreen({ onAuth }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [phone, setPhone] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const submit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
          const data = await api(mode==='login'?'/auth/login':'/auth/signup', { method:'POST', body: mode==='login'?{email,password}:{email,password,phone} });
          localStorage.setItem('ja_token', data.token);
          onAuth(data.user);
        } catch(e) { setError(e.message); }
        setLoading(false);
      };

      return (
        <div className="screen" style={{ background:'radial-gradient(ellipse at 50% 0%,var(--accent-soft) 0%,var(--bg) 60%)' }}>
          <div style={{ width:400, padding:20 }}>
            <div style={{ textAlign:'center', marginBottom:40 }}>
              <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:56, height:56, borderRadius:16, background:'linear-gradient(135deg,#a78bfa20,#34d39920)', border:'1px solid var(--accent-glow)', marginBottom:16 }}>
                <span style={{ fontSize:24 }}>🎯</span>
              </div>
              <h1 style={{ fontSize:26, fontWeight:700, margin:'0 0 6px' }}>Job Agent</h1>
              <p style={{ color:'var(--text-muted)', fontSize:14 }}>AI-powered job matching, delivered daily</p>
            </div>
            <div className="card" style={{ boxShadow:'0 8px 32px rgba(0,0,0,0.3)' }}>
              <div style={{ display:'flex', gap:4, background:'var(--bg)', borderRadius:10, padding:4, marginBottom:24 }}>
                {['login','signup'].map(m => (
                  <button key={m} onClick={() => { setMode(m); setError(''); }} className="btn" style={{ flex:1, padding:'10px 0', borderRadius:8, fontSize:13, background:mode===m?'var(--accent)':'transparent', color:mode===m?'#fff':'var(--text-muted)' }}>
                    {m==='login'?'Sign In':'Create Account'}
                  </button>
                ))}
              </div>
              <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:14 }}>
                <input className="input" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required />
                <input className="input" placeholder="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} />
                {mode==='signup' && <input className="input" placeholder="Phone (optional)" value={phone} onChange={e=>setPhone(e.target.value)} />}
                {error && <p style={{ color:'var(--red)', fontSize:13 }}>{error}</p>}
                <button type="submit" disabled={loading} className="btn" style={{ width:'100%', padding:14, marginTop:6, background:loading?'var(--text-dim)':'var(--accent)', color:'#fff', fontSize:14 }}>
                  {loading ? 'Processing...' : mode==='login' ? 'Sign In' : 'Create Account'}
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // ── RESUME UPLOAD ──
    function ResumeUpload({ onComplete, embedded }) {
      const [uploadMode, setUploadMode] = useState('file');
      const [text, setText] = useState('');
      const [file, setFile] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [result, setResult] = useState(null);

      const acceptExts = /\.(pdf|txt|jpe?g|png|docx?)$/i;

      const handleFile = (e) => {
        const f = e.dataTransfer ? e.dataTransfer.files[0] : e.target.files[0];
        if (f) {
          if (!acceptExts.test(f.name)) {
            setError('Unsupported file. Use PDF, TXT, JPG, PNG, DOC, or DOCX.');
            return;
          }
          setFile(f);
          setError('');
        }
      };

      const submit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
          let data;
          if (uploadMode === 'file' && file) {
            const fd = new FormData();
            fd.append('resume', file);
            data = await apiUpload('/profile/resume/upload', fd);
          } else {
            data = await api('/profile/resume', { method:'POST', body:{resume_text:text} });
          }
          setResult(data.profile);
        } catch(e) { setError(e.message); }
        setLoading(false);
      };

      const canSubmit = uploadMode === 'file' ? !!file : text.length >= 50;

      if (result) return (
        <div className={embedded ? '' : 'screen'} style={embedded ? {} : { background:'radial-gradient(ellipse at 50% 0%,var(--green-soft) 0%,var(--bg) 60%)' }}>
          <div style={{ maxWidth:520, padding:20, width:'100%', margin: embedded ? '0 auto' : undefined }}>
            <div className="fade-up" style={{ textAlign:'center', marginBottom:32 }}>
              <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:56, height:56, borderRadius:'50%', background:'var(--green-soft)', border:'2px solid #34d39940', marginBottom:16, fontSize:24, color:'var(--green)' }}>✓</div>
              <h2 style={{ fontSize:22 }}>Profile {embedded ? 'Updated' : 'Extracted'}</h2>
              <p style={{ color:'var(--text-muted)', fontSize:14 }}>AI analyzed your resume</p>
            </div>
            <div className="card fade-up fade-d1">
              {result.primary_roles?.length > 0 && <div style={{ marginBottom:18 }}><div className="label">Target Roles</div><div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{result.primary_roles.map(r => <Tag key={r}>{r}</Tag>)}</div></div>}
              {(result.skills || result.core_skills)?.length > 0 && <div style={{ marginBottom:18 }}><div className="label">Skills</div><div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{(result.skills || result.core_skills).slice(0,12).map(s => <Tag key={s} color="#34d399">{s}</Tag>)}</div></div>}
              <div style={{ display:'flex', gap:20, flexWrap:'wrap', fontSize:13 }}>
                {result.seniority_level && <span><span style={{ color:'var(--text-dim)', fontSize:11 }}>Level: </span><strong>{result.seniority_level}</strong></span>}
                {result.remote_preference && <span><span style={{ color:'var(--text-dim)', fontSize:11 }}>Remote: </span><strong>{result.remote_preference}</strong></span>}
                {result.salary_expectation && <span><span style={{ color:'var(--text-dim)', fontSize:11 }}>Salary: </span><strong>{result.salary_expectation}</strong></span>}
              </div>
            </div>
            <button onClick={onComplete} className="btn fade-up fade-d2" style={{ width:'100%', padding:14, marginTop:20, background:'var(--accent)', color:'#fff', fontSize:14 }}>{embedded ? 'Done' : 'Go to Dashboard →'}</button>
          </div>
        </div>
      );

      return (
        <div className={embedded ? '' : 'screen'} style={embedded ? {} : { background:'radial-gradient(ellipse at 50% 0%,var(--accent-soft) 0%,var(--bg) 60%)' }}>
          <div style={{ maxWidth:560, width:'100%', padding:20, margin: embedded ? '0 auto' : undefined }}>
            <div style={{ textAlign:'center', marginBottom:32 }}>
              <div style={{ fontSize:40, marginBottom:12, opacity:0.4 }}>📄</div>
              <h2 style={{ fontSize:22 }}>{embedded ? 'Re-upload Resume' : 'Upload Your Resume'}</h2>
              <p style={{ color:'var(--text-muted)', fontSize:14 }}>Upload a file or paste text. AI will extract your profile.</p>
            </div>

            {/* Mode toggle */}
            <div style={{ display:'flex', gap:4, background:'var(--bg)', borderRadius:10, padding:4, marginBottom:20 }}>
              {[{id:'file',l:'Upload File'},{id:'text',l:'Paste Text'}].map(m => (
                <button key={m.id} onClick={()=>{setUploadMode(m.id);setError('');}} className="btn" style={{ flex:1, padding:'10px 0', borderRadius:8, fontSize:13, background:uploadMode===m.id?'var(--accent)':'transparent', color:uploadMode===m.id?'#fff':'var(--text-muted)' }}>{m.l}</button>
              ))}
            </div>

            <form onSubmit={submit}>
              {uploadMode === 'file' ? (
                <div
                  className={'drop-zone' + (dragOver ? ' active' : '') + (file ? ' has-file' : '')}
                  onDragOver={(e)=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={(e)=>{e.preventDefault();setDragOver(false);handleFile(e);}}
                  onClick={()=>document.getElementById('file-input')?.click()}
                >
                  <input id="file-input" type="file" accept=".pdf,.txt,.jpg,.jpeg,.png,.doc,.docx" onChange={handleFile} style={{display:'none'}} />
                  {file ? (
                    <>
                      <div style={{fontSize:32}}>✅</div>
                      <div style={{fontSize:14,fontWeight:600,color:'#34d399'}}>{file.name}</div>
                      <div style={{fontSize:12,color:'var(--text-dim)'}}>{(file.size/1024).toFixed(1)} KB · Click or drag to replace</div>
                    </>
                  ) : (
                    <>
                      <div style={{fontSize:32,opacity:0.5}}>📎</div>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text-muted)'}}>Drag & drop your resume here</div>
                      <div style={{fontSize:12,color:'var(--text-dim)'}}>or click to browse · PDF, JPG, PNG, DOC, DOCX, TXT</div>
                      <div style={{fontSize:11,color:'var(--text-dim)',marginTop:4}}>Max 5MB</div>
                    </>
                  )}
                </div>
              ) : (
                <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste your resume text here..." style={{ width:'100%', minHeight:240, padding:18, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, color:'var(--text)', fontSize:13, lineHeight:1.7, resize:'vertical', outline:'none', fontFamily:"'Source Serif 4',serif", boxSizing:'border-box' }} />
              )}
              {error && <p style={{ color:'var(--red)', fontSize:13, marginTop:10 }}>{error}</p>}
              <button type="submit" disabled={loading||!canSubmit} className="btn" style={{ width:'100%', padding:14, marginTop:16, background:loading||!canSubmit?'var(--text-dim)':'var(--accent)', color:'#fff', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                {loading ? 'Analyzing resume...' : 'Extract Profile with AI'}
              </button>
            </form>
            <p style={{ textAlign:'center', color:'var(--text-dim)', fontSize:12, marginTop:10 }}>Supports PDF, JPG, PNG, DOC, DOCX, and plain text.</p>
          </div>
        </div>
      );
    }

    // ── AI INSIGHTS MODAL ──
    function InsightsModal({ onClose }) {
      const [insights, setInsights] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        api('/experience/insights')
          .then(d => setInsights(d.insights))
          .catch(e => setError(e.message))
          .finally(() => setLoading(false));
      }, []);

      const qc = { low:'#ef4444', medium:'#fbbf24', high:'#34d399' };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{ padding:'24px 28px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:'linear-gradient(135deg,#a78bfa20,#fbbf2420)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>💡</div>
                <div>
                  <h2 style={{ margin:0, fontSize:18, fontWeight:700 }}>AI Insights</h2>
                  <p style={{ margin:0, fontSize:11, color:'var(--text-dim)' }}>Personalized suggestions for your job search</p>
                </div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-dim)', fontSize:20, cursor:'pointer', padding:4 }}>×</button>
            </div>
            <div style={{ padding:'24px 28px 28px' }}>
              {loading ? (
                <div style={{ textAlign:'center', padding:40, color:'var(--text-muted)' }}>
                  <div style={{ fontSize:28, marginBottom:12, animation:'pulse 1.5s ease-in-out infinite' }}>🧠</div>
                  Analyzing your profile & matches...
                </div>
              ) : error ? (
                <div style={{ textAlign:'center', padding:40, color:'var(--red)' }}>
                  <div style={{ fontSize:28, marginBottom:12 }}>⚠️</div>{error}
                </div>
              ) : insights ? (
                <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
                  {/* Summary */}
                  <div style={{ padding:18, background:'var(--bg)', borderRadius:14, border:'1px solid var(--border)' }}>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                      <span className="label" style={{marginBottom:0}}>Summary</span>
                      <Tag color={qc[insights.match_quality]||'#6b7280'}>{insights.match_quality} quality</Tag>
                    </div>
                    <p style={{ margin:0, fontSize:14, lineHeight:1.6, fontFamily:"'Source Serif 4',serif", color:'var(--text-muted)' }}>{insights.summary}</p>
                  </div>

                  {/* Strengths */}
                  {insights.strengths?.length > 0 && <div>
                    <div className="label" style={{color:'#34d399'}}>Strengths</div>
                    {insights.strengths.map((s,i) => <div key={i} style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:'var(--text-muted)', marginBottom:6 }}><span style={{color:'#34d399',flexShrink:0}}>+</span> {s}</div>)}
                  </div>}

                  {/* Suggestions */}
                  {insights.improvements?.length > 0 && <div>
                    <div className="label" style={{color:'#fbbf24'}}>Suggestions</div>
                    {insights.improvements.map((s,i) => <div key={i} style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:'var(--text-muted)', marginBottom:6 }}><span style={{color:'#fbbf24',flexShrink:0}}>→</span> {s}</div>)}
                  </div>}

                  {/* Skill gaps */}
                  {insights.skill_gaps?.length > 0 && <div>
                    <div className="label" style={{color:'#ef4444'}}>Skill Gaps</div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{insights.skill_gaps.map((s,i) => <Tag key={i} color="#ef4444">{s}</Tag>)}</div>
                  </div>}

                  {/* Market trends */}
                  {insights.market_trends && <div style={{ padding:16, background:'linear-gradient(135deg,#a78bfa08,#60a5fa08)', borderRadius:12, border:'1px solid #a78bfa15' }}>
                    <div className="label" style={{color:'#60a5fa'}}>Market Trends</div>
                    <p style={{ margin:0, fontSize:13, lineHeight:1.6, color:'var(--text-muted)', fontFamily:"'Source Serif 4',serif" }}>{insights.market_trends}</p>
                  </div>}

                  {/* Next steps */}
                  {insights.next_steps?.length > 0 && <div>
                    <div className="label" style={{color:'#a78bfa'}}>Next Steps</div>
                    {insights.next_steps.map((s,i) => (
                      <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'var(--bg)', borderRadius:10, border:'1px solid var(--border)', fontSize:13, color:'var(--text-muted)', marginBottom:8 }}>
                        <span style={{ width:22, height:22, borderRadius:6, flexShrink:0, background:'var(--accent-soft)', color:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700 }}>{i+1}</span>
                        {s}
                      </div>
                    ))}
                  </div>}

                  {insights.confidence_score && <div style={{ textAlign:'center', paddingTop:8 }}><span style={{ fontSize:11, color:'var(--text-dim)' }}>Confidence: {insights.confidence_score}%</span></div>}
                </div>
              ) : null}
            </div>
          </div>
        </div>
      );
    }

    // ── PROFILE TAB ──
    function ProfileTab({ profile, setProfile, showReupload, setShowReupload, loadData }) {
      const [editing, setEditing] = useState(null);
      const [salaryMin, setSalaryMin] = useState('');
      const [salaryMax, setSalaryMax] = useState('');
      const [locInput, setLocInput] = useState('');
      const [roleInput, setRoleInput] = useState('');
      const [skillInput, setSkillInput] = useState('');

      // Parse existing salary on mount
      useEffect(() => {
        const s = profile?.salary_expectation || '';
        const m = s.match(/\$?([\d]+)k?\s*[-–—to]+\s*\$?([\d]+)k?/i);
        if (m) { setSalaryMin(m[1]); setSalaryMax(m[2]); }
        else if (s) { setSalaryMin(s.replace(/[^0-9]/g,'')); }
      }, [profile?.salary_expectation]);

      const savePref = async (key, val) => {
        await api('/profile', { method:'PATCH', body:{ [key]: val } }).catch(()=>{});
        setProfile(p => ({...p, [key]: val}));
      };

      const saveSalary = () => {
        const min = salaryMin.trim();
        const max = salaryMax.trim();
        let val = '';
        if (min && max) val = `$${min}k–$${max}k`;
        else if (min) val = `$${min}k+`;
        savePref('salary_expectation', val);
        setEditing(null);
      };

      const addLocation = () => {
        if (!locInput.trim()) return;
        const locs = [...(profile?.preferred_locations||[]), locInput.trim()];
        savePref('preferred_locations', locs);
        setLocInput('');
      };

      const removeLocation = (i) => {
        const locs = (profile?.preferred_locations||[]).filter((_,idx) => idx !== i);
        savePref('preferred_locations', locs);
      };

      const addRole = () => {
        if (!roleInput.trim()) return;
        const roles = [...(profile?.primary_roles||[]), roleInput.trim()];
        savePref('primary_roles', roles);
        setRoleInput('');
      };

      const removeRole = (i) => {
        const roles = (profile?.primary_roles||[]).filter((_,idx) => idx !== i);
        savePref('primary_roles', roles);
      };

      const addSkill = () => {
        if (!skillInput.trim()) return;
        const skills = [...(profile?.skills||[]), skillInput.trim()];
        savePref('skills', skills);
        setSkillInput('');
      };

      const removeSkill = (i) => {
        const skills = (profile?.skills||[]).filter((_,idx) => idx !== i);
        savePref('skills', skills);
      };

      const RemovableTag = ({ children, onRemove, color = '#a78bfa' }) => (
        <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'5px 10px', background:color+'15', border:'1px solid '+color+'30', borderRadius:8, fontSize:12, color }}>
          {children}
          <button onClick={onRemove} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:14, padding:0, lineHeight:1 }}>×</button>
        </span>
      );

      const SectionLabel = ({ children }) => (
        <div style={{ fontSize:10, color:'var(--text-dim)', fontWeight:600, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>{children}</div>
      );

      return (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
            <h2 style={{ margin:0, fontSize:18, fontWeight:600 }}>Your Profile</h2>
            <button onClick={()=>setShowReupload(!showReupload)} className="btn" style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', background:showReupload?'var(--accent-soft)':'transparent', border:'1px solid '+(showReupload?'var(--accent-glow)':'var(--border)'), borderRadius:8, color:showReupload?'var(--accent)':'var(--text-muted)', fontSize:12 }}>
              {showReupload ? 'Hide Upload' : 'Re-upload Resume'}
            </button>
          </div>

          {showReupload && (
            <div className="card" style={{ borderRadius:18, marginBottom:20, padding:28 }}>
              <ResumeUpload embedded onComplete={()=>{setShowReupload(false);loadData();}} />
            </div>
          )}

          {/* Header card */}
          <div className="card" style={{ borderRadius:18, position:'relative', overflow:'hidden', marginBottom:20 }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:3, background:'linear-gradient(90deg,#a78bfa,#34d399,#60a5fa)' }} />
            <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:16 }}>
              <div style={{ width:50, height:50, borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:700, background:'linear-gradient(135deg,#a78bfa20,#34d39920)', border:'1px solid #a78bfa25', color:'var(--accent)' }}>{(profile.email||'?')[0].toUpperCase()}</div>
              <div>
                <div style={{ fontSize:18, fontWeight:700 }}>{profile.email}</div>
                <div style={{ fontSize:13, color:'var(--text-dim)', marginTop:2 }}>
                  {profile.seniority_level||'—'} · {profile.years_experience||0} yrs
                </div>
              </div>
            </div>
          </div>

          {/* Target Roles */}
          <div className="card" style={{ borderRadius:18, marginBottom:20 }}>
            <SectionLabel>Target Roles</SectionLabel>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
              {(profile.primary_roles||[]).map((r,i) => <RemovableTag key={r+i} onRemove={()=>removeRole(i)}>{r}</RemovableTag>)}
              {(!profile.primary_roles||profile.primary_roles.length===0) && <span style={{ fontSize:12, color:'var(--text-dim)' }}>No roles added yet</span>}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <input className="input" placeholder="e.g. Frontend Developer" value={roleInput} onChange={e=>setRoleInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addRole();}} style={{ flex:1 }} />
              <button onClick={addRole} className="btn" style={{ padding:'8px 16px', background:'#a78bfa18', color:'#a78bfa', border:'1px solid #a78bfa40', borderRadius:8, fontSize:12 }}>Add</button>
            </div>
          </div>

          {/* Skills */}
          <div className="card" style={{ borderRadius:18, marginBottom:20 }}>
            <SectionLabel>Skills</SectionLabel>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
              {(profile.skills||[]).map((s,i) => <RemovableTag key={s+i} color="#34d399" onRemove={()=>removeSkill(i)}>{s}</RemovableTag>)}
              {(!profile.skills||profile.skills.length===0) && <span style={{ fontSize:12, color:'var(--text-dim)' }}>No skills added yet</span>}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <input className="input" placeholder="e.g. React, Python, SQL" value={skillInput} onChange={e=>setSkillInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addSkill();}} style={{ flex:1 }} />
              <button onClick={addSkill} className="btn" style={{ padding:'8px 16px', background:'#34d39918', color:'#34d399', border:'1px solid #34d39940', borderRadius:8, fontSize:12 }}>Add</button>
            </div>
          </div>

          {/* Salary Range */}
          <div className="card" style={{ borderRadius:18, marginBottom:20 }}>
            <SectionLabel>Preferred Salary Range</SectionLabel>
            {editing === 'salary' ? (
              <div>
                <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:10 }}>
                  <span style={{ color:'var(--text-dim)', fontSize:14 }}>$</span>
                  <input className="input" type="number" placeholder="Min (e.g. 80)" value={salaryMin} onChange={e=>setSalaryMin(e.target.value)} style={{ width:100, textAlign:'center' }} />
                  <span style={{ color:'var(--text-dim)', fontSize:12 }}>k</span>
                  <span style={{ color:'var(--text-dim)', fontSize:14 }}>—</span>
                  <span style={{ color:'var(--text-dim)', fontSize:14 }}>$</span>
                  <input className="input" type="number" placeholder="Max (e.g. 120)" value={salaryMax} onChange={e=>setSalaryMax(e.target.value)} style={{ width:100, textAlign:'center' }} />
                  <span style={{ color:'var(--text-dim)', fontSize:12 }}>k</span>
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={saveSalary} className="btn" style={{ padding:'8px 18px', background:'#a78bfa18', color:'#a78bfa', border:'1px solid #a78bfa40', borderRadius:8, fontSize:12 }}>Save</button>
                  <button onClick={()=>setEditing(null)} className="btn" style={{ padding:'8px 18px', background:'transparent', color:'var(--text-dim)', border:'1px solid var(--border)', borderRadius:8, fontSize:12 }}>Cancel</button>

              </div>
            ) : (
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div style={{ fontSize:16, fontWeight:600, color: profile.salary_expectation ? 'var(--text)' : 'var(--text-dim)' }}>
                  {profile.salary_expectation || 'Not set'}

              </div>

          </div>

          {/* Preferred Locations */}
          <div className="card" style={{ borderRadius:18, marginBottom:20 }}>
            <SectionLabel>Preferred Locations</SectionLabel>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
              {(profile.preferred_locations||[]).map((loc,i) => <RemovableTag key={loc+i} color="#60a5fa" onRemove={()=>removeLocation(i)}>{loc}</RemovableTag>)}
              {(!profile.preferred_locations||profile.preferred_locations.length===0) && <span style={{ fontSize:12, color:'var(--text-dim)' }}>No locations added — add cities or regions you'd work in</span>}
            </div>
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              <input className="input" placeholder="e.g. New York, Austin TX, Bay Area" value={locInput} onChange={e=>setLocInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addLocation();}} style={{ flex:1 }} />
              <button onClick={addLocation} className="btn" style={{ padding:'8px 16px', background:'#60a5fa18', color:'#60a5fa', border:'1px solid #60a5fa40', borderRadius:8, fontSize:12 }}>Add</button>
            </div>

            <SectionLabel>Location Type</SectionLabel>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {[{id:'any',l:'Any'},{id:'remote',l:'Remote'},{id:'local',l:'On-site'},{id:'hybrid',l:'Hybrid'}].map(t => (
                <button key={t.id} onClick={()=>savePref('location_type',t.id)} className="btn" style={{ padding:'8px 16px', borderRadius:10, fontSize:12, background:(profile?.location_type||'any')===t.id?'#34d39918':'transparent', color:(profile?.location_type||'any')===t.id?'#34d399':'var(--text-dim)', border:'1px solid '+((profile?.location_type||'any')===t.id?'#34d39950':'var(--border)'), fontWeight:(profile?.location_type||'any')===t.id?600:400 }}>{t.l}</button>
              ))}
            </div>
          </div>

          {/* Remote Preference & Other Info */}
          <div className="card" style={{ borderRadius:18 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
              <div>
                <SectionLabel>Remote Preference</SectionLabel>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                  {['remote','hybrid','onsite','flexible'].map(r => (
                    <button key={r} onClick={()=>savePref('remote_preference',r)} className="btn" style={{ padding:'6px 12px', borderRadius:8, fontSize:11, textTransform:'capitalize', background:profile?.remote_preference===r?'#a78bfa18':'transparent', color:profile?.remote_preference===r?'#a78bfa':'var(--text-dim)', border:'1px solid '+(profile?.remote_preference===r?'#a78bfa40':'var(--border)') }}>{r}</button>
                  ))}
                </div>
              </div>
              <div>
                <SectionLabel>Notifications</SectionLabel>
                <div style={{ fontSize:13, color:'var(--text)' }}>{profile.notification_method || '—'}</div>
              </div>
              <div>
                <SectionLabel>Industries</SectionLabel>
                <div style={{ fontSize:13, color:'var(--text)' }}>{(profile.industries||[]).join(', ') || '—'}</div>
              </div>
              <div>
                <SectionLabel>Seniority</SectionLabel>
                <div style={{ fontSize:13, color:'var(--text)' }}>{profile.seniority_level || '—'} · {profile.years_experience||0} yrs</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── SETTINGS TAB ──
    function SettingsTab({ profile, setProfile, smsTestLoading, smsTestResult, handleSmsTest }) {
      const [phoneEdit, setPhoneEdit] = useState(profile?.phone || '');
      const [phoneSaving, setPhoneSaving] = useState(false);
      const [phoneSaved, setPhoneSaved] = useState(false);
      const [customUrl, setCustomUrl] = useState('');

      const savePref = async (key, val) => {
        await api('/profile', { method:'PATCH', body:{ [key]: val } }).catch(()=>{});
        setProfile(p => ({...p, [key]: val}));
      };

      const savePhone = async () => {
        setPhoneSaving(true);
        await savePref('phone', phoneEdit);
        setPhoneSaved(true); setPhoneSaving(false);
        setTimeout(() => setPhoneSaved(false), 2000);
      };

      const sources = profile?.job_sources || ['jsearch'];
      const customSources = profile?.custom_sources || [];

      const toggleSource = (src) => {
        const current = [...sources];
        const idx = current.indexOf(src);
        if (idx >= 0) { current.splice(idx, 1); } else { current.push(src); }
        if (current.length === 0) current.push('jsearch');
        savePref('job_sources', current);
      };

      const addCustomSource = () => {
        if (!customUrl.trim()) return;
        const updated = [...customSources, customUrl.trim()];
        savePref('custom_sources', updated);
        setCustomUrl('');
      };

      const removeCustomSource = (i) => {
        const updated = customSources.filter((_, idx) => idx !== i);
        savePref('custom_sources', updated);
      };

      const BtnToggle = ({ active, onClick, children, color = 'var(--accent)' }) => (
        <button onClick={onClick} className="btn" style={{ padding:'10px 16px', borderRadius:10, fontSize:12, background:active?color+'18':'transparent', color:active?color:'var(--text-dim)', border:'1px solid '+(active?color+'50':'var(--border)'), fontWeight:active?600:400 }}>{children}</button>
      );

      return (
        <div>
          <h2 style={{ margin:'0 0 18px', fontSize:18, fontWeight:600 }}>Settings</h2>

          {/* ── JOB SOURCES ── */}
          <div className="card" style={{ borderRadius:18, marginBottom:20 }}>

            <p style={{ fontSize:11, color:'var(--text-dim)', marginBottom:12 }}>Choose which job boards to search. JSearch aggregates from many sources.</p>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:14 }}>
              {[
                { id:'jsearch', l:'All Sources (JSearch)', c:'#a78bfa' },
                { id:'indeed', l:'Indeed', c:'#2164f3' },
                { id:'ziprecruiter', l:'ZipRecruiter', c:'#34d399' },
                { id:'glassdoor', l:'Glassdoor', c:'#0caa41' },
                { id:'monster', l:'Monster', c:'#6e45e2' },
                { id:'linkedin', l:'LinkedIn', c:'#0077b5' },
                { id:'company_sites', l:'Company Websites', c:'#fbbf24' },
              ].map(s => (
                <BtnToggle key={s.id} active={sources.includes(s.id)} color={s.c} onClick={()=>toggleSource(s.id)}>{s.l}</BtnToggle>

                <BtnToggle key={t.id} active={(profile?.work_schedule||'full_time')===t.id} color="#60a5fa" onClick={()=>savePref('work_schedule',t.id)}>{t.l}</BtnToggle>

            <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:12 }}>
              {[{id:'any',l:'Any'},{id:'remote',l:'Remote Only'},{id:'local',l:'Local / On-site'},{id:'hybrid',l:'Hybrid'}].map(t => (
                <BtnToggle key={t.id} active={(profile?.location_type||'any')===t.id} color="#34d399" onClick={()=>savePref('location_type',t.id)}>{t.l}</BtnToggle>
              ))}

                {smsTestLoading ? 'Sending...' : 'Send Test SMS'}

            <div className="label">Cost Transparency</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>
              {[{l:'AI/day',v:'~3',c:'#a78bfa'},{l:'Monthly',v:'$0.10',c:'#34d399'},{l:'Jobs',v:'100+',c:'#60a5fa'},{l:'Matches',v:'Top 3',c:'#fbbf24'}].map(c=>(

    // ── ADD JOB MODAL ──
    function AddJobModal({ onClose, onAdded }) {
      const [mode, setMode] = useState('manual');
      const [form, setForm] = useState({ title:'', company:'', location:'', salary:'', description:'', url:'' });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [photoFile, setPhotoFile] = useState(null);
      const [extractedText, setExtractedText] = useState('');

      const set = (k, v) => setForm(f => ({...f, [k]: v}));

      const handlePhotoUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setPhotoFile(file);
        setLoading(true); setError('');
        try {
          const reader = new FileReader();
          reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            const res = await api('/tracker/extract-photo', { method:'POST', body:{ image_data: base64, mime_type: file.type } });
            if (res.extracted) {
              setForm(f => ({...f, ...res.extracted}));
              setExtractedText(res.raw_text || '');
            }
            setLoading(false);
          };
          reader.readAsDataURL(file);
        } catch(e) { setError(e.message); setLoading(false); }
      };

      const handleLinkPaste = async () => {
        if (!form.url) return;
        set('description', 'Job from: ' + form.url);
      };

      const submit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
          if (!form.title) { setError('Job title is required'); setLoading(false); return; }
          await api('/tracker/submit-job', { method:'POST', body: form });
          onAdded();
        } catch(e) { setError(e.message); }
        setLoading(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{ padding:28 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
              <h2 style={{ margin:0, fontSize:20, fontWeight:600 }}>Add Job</h2>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-dim)', fontSize:20, cursor:'pointer' }}>×</button>
            </div>

            {/* Mode Toggle */}
            <div style={{ display:'flex', gap:4, background:'var(--bg)', borderRadius:10, padding:4, marginBottom:20 }}>
              {[{id:'manual',l:'Manual Entry'},{id:'link',l:'From Link'},{id:'photo',l:'From Photo'}].map(m => (
                <button key={m.id} onClick={()=>{setMode(m.id);setError('');}} className="btn" style={{ flex:1, padding:'9px 0', borderRadius:8, fontSize:12, background:mode===m.id?'var(--accent)':'transparent', color:mode===m.id?'#fff':'var(--text-muted)' }}>{m.l}</button>
              ))}
            </div>

            {mode === 'photo' && (
              <div style={{ marginBottom:16 }}>
                <div className={'drop-zone' + (photoFile ? ' has-file' : '')} onClick={()=>document.getElementById('job-photo-input')?.click()} style={{ minHeight:120 }}>
                  <input id="job-photo-input" type="file" accept="image/*" onChange={handlePhotoUpload} style={{display:'none'}} />
                  {photoFile ? (
                    <><div style={{fontSize:24}}>✅</div><div style={{fontSize:13,color:'#34d399'}}>{photoFile.name}</div></>
                  ) : (
                    <><div style={{fontSize:28,opacity:0.4}}>📸</div><div style={{fontSize:13,color:'var(--text-dim)'}}>Click to upload a screenshot or photo of a job posting</div></>
                  )}
                </div>
                {extractedText && <div style={{ marginTop:10, padding:10, background:'var(--bg)', borderRadius:8, fontSize:11, color:'var(--text-dim)', maxHeight:80, overflow:'auto' }}>{extractedText}</div>}
              </div>
            )}

            {mode === 'link' && (
              <div style={{ marginBottom:16 }}>
                <input className="input" placeholder="Paste job posting URL" value={form.url} onChange={e=>set('url',e.target.value)} onBlur={handleLinkPaste} />
                <p style={{ fontSize:11, color:'var(--text-dim)', marginTop:6 }}>Paste the URL, then fill in the details below</p>
              </div>
            )}

            <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <input className="input" placeholder="Job Title *" value={form.title} onChange={e=>set('title',e.target.value)} required />
              <div style={{ display:'flex', gap:10 }}>
                <input className="input" placeholder="Company" value={form.company} onChange={e=>set('company',e.target.value)} style={{flex:1}} />
                <input className="input" placeholder="Location" value={form.location} onChange={e=>set('location',e.target.value)} style={{flex:1}} />
              </div>
              <div style={{ display:'flex', gap:10 }}>
                <input className="input" placeholder="Salary (e.g. $60k-$80k)" value={form.salary} onChange={e=>set('salary',e.target.value)} style={{flex:1}} />
                {mode !== 'link' && <input className="input" placeholder="Application URL" value={form.url} onChange={e=>set('url',e.target.value)} style={{flex:1}} />}
              </div>
              <textarea className="input" placeholder="Description / Notes" value={form.description} onChange={e=>set('description',e.target.value)} rows={3} style={{ resize:'vertical', minHeight:70 }} />
              {error && <p style={{ color:'var(--red)', fontSize:13, margin:0 }}>{error}</p>}
              <button type="submit" disabled={loading} className="btn" style={{ width:'100%', padding:14, background:loading?'var(--text-dim)':'var(--accent)', color:'#fff', fontSize:14, marginTop:4 }}>
                {loading ? 'Saving...' : 'Add to Tracker'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── DASHBOARD ──
    function Dashboard({ onLogout }) {
      const [tab, setTab] = useState('matches');
      const [matches, setMatches] = useState([]);
      const [stats, setStats] = useState({ total_matches:0, today_matches:0, notifications_sent:0, avg_score:0 });
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [testRunning, setTestRunning] = useState(false);
      const [testResult, setTestResult] = useState(null);
      const [showInsights, setShowInsights] = useState(false);
      const [showReupload, setShowReupload] = useState(false);
      const [savedJobs, setSavedJobs] = useState({});
      const [trackerJobs, setTrackerJobs] = useState([]);
      const [trackerFilter, setTrackerFilter] = useState('all');
      const [trackerStats, setTrackerStats] = useState({ saved:0, applied:0, interviewing:0, offer:0, rejected:0 });
      const [showAddJob, setShowAddJob] = useState(false);
      const [smsTestResult, setSmsTestResult] = useState(null);
      const [smsTestLoading, setSmsTestLoading] = useState(false);

      const loadData = useCallback(() => {
        setLoading(true);
        Promise.all([
          api('/matches').catch(()=>({matches:[]})),
          api('/matches/stats').catch(()=>({total_matches:0,today_matches:0,notifications_sent:0,avg_score:0})),
          api('/profile').catch(()=>null),
          api('/tracker').catch(()=>({saved_jobs:[]})),
          api('/tracker/stats').catch(()=>({saved:0,applied:0,interviewing:0,offer:0,rejected:0})),
        ]).then(([m,s,p,t,ts]) => {
          setMatches(m.matches||[]);
          setStats(s);
          setProfile(p);
          const saved = {};
          (t.saved_jobs||[]).forEach(sj => { if(sj.jobs?.id) saved[sj.jobs.id] = sj; });
          setSavedJobs(saved);
          setTrackerJobs(t.saved_jobs||[]);
          setTrackerStats(ts);
          setLoading(false);
        });
      }, []);

      useEffect(() => { loadData(); }, [loadData]);

      const trackAction = useCallback((action, matchId) => {
        api('/experience', { method:'POST', body:{ action, match_id: matchId || null } }).catch(()=>{});
      }, []);

      const [scanMode, setScanMode] = useState(null);

      const handleTestRun = async (mode = 'full') => {
        setTestRunning(true); setTestResult(null); setScanMode(mode);
        try {
          trackAction('test_run');
          const res = await api('/admin/run-worker', { method:'POST', body: { mode } });
          const r = res.result || {};
          const modeLabel = mode === 'quick' ? 'Quick Scan' : mode === 'ai' ? 'AI Analysis' : 'Full Scan';
          const msg = `${modeLabel}: ${r.matches || 0} matches from ${r.jobs || 0} jobs in ${r.elapsed || '?'}`;
          setTestResult({ ok:true, msg });
          loadData();
        } catch(e) { setTestResult({ ok:false, msg: e.message }); }
        setTestRunning(false); setScanMode(null);
      };

      const toggleSave = async (jobId, currentStatus) => {
        if (savedJobs[jobId]) {
          await api(`/tracker/${savedJobs[jobId].id}`, { method:'DELETE' }).catch(()=>{});
          setSavedJobs(prev => { const n = {...prev}; delete n[jobId]; return n; });
        } else {
          const res = await api('/tracker', { method:'POST', body:{ job_id: jobId, status: 'saved' } }).catch(()=>null);
          if (res?.saved_job) setSavedJobs(prev => ({...prev, [jobId]: res.saved_job}));
        }
        loadData();
      };

      const updateTrackerStatus = async (id, status) => {
        await api(`/tracker/${id}`, { method:'PATCH', body:{ status } }).catch(()=>{});
        loadData();
      };

      const handleSmsTest = async () => {
        setSmsTestLoading(true); setSmsTestResult(null);
        try {
          const res = await api('/admin/test-sms', { method:'POST' });
          setSmsTestResult({ ok:true, msg: res.message });
        } catch(e) { setSmsTestResult({ ok:false, msg: e.message }); }
        setSmsTestLoading(false);
      };

      return (
        <div style={{ minHeight:'100vh' }}>
          <div className="grid-bg" />

          {showInsights && <InsightsModal onClose={()=>setShowInsights(false)} />}

          <header style={{ position:'sticky', top:0, zIndex:100, borderBottom:'1px solid var(--border)', background:'rgba(10,10,18,0.85)', backdropFilter:'blur(16px)', padding:'0 28px', height:58, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ width:30, height:30, borderRadius:8, background:'linear-gradient(135deg,#a78bfa30,#34d39930)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>🎯</div>
              <span style={{ fontWeight:700, fontSize:16 }}>Job Agent</span>
              <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--green)', boxShadow:'0 0 8px #34d39960', animation:'pulse 2s ease-in-out infinite' }} />
            </div>
            <nav style={{ display:'flex', gap:2 }}>
              {[{id:'matches',icon:'🎯',l:'Matches'},{id:'tracker',icon:'📋',l:'Tracker'},{id:'profile',icon:'👤',l:'Profile'},{id:'settings',icon:'⚙️',l:'Settings'}].map(n => (
                <button key={n.id} onClick={()=>setTab(n.id)} className={'nav-btn'+(tab===n.id?' active':'')}><span style={{fontSize:13}}>{n.icon}</span> {n.l}</button>
              ))}
            </nav>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>setShowInsights(true)} className="btn" style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', background:'linear-gradient(135deg,#a78bfa15,#fbbf2415)', border:'1px solid #a78bfa30', borderRadius:8, color:'#fbbf24', fontSize:12 }}>💡 AI Insights</button>
              <button onClick={onLogout} style={{ padding:'8px 14px', background:'transparent', border:'1px solid var(--border)', borderRadius:8, color:'var(--text-muted)', fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>Sign Out</button>
            </div>
          </header>

          <main style={{ position:'relative', zIndex:1, maxWidth:920, margin:'0 auto', padding:'28px 20px 60px' }}>
            {/* MATCHES TAB */}
            {tab==='matches' && <>
              <div style={{ display:'flex', gap:14, marginBottom:28, flexWrap:'wrap' }}>
                {[{l:'Total Matches',v:stats.total_matches,c:'#a78bfa'},{l:'Today',v:stats.today_matches,c:'#fbbf24'},{l:'Alerts Sent',v:stats.notifications_sent,c:'#34d399'},{l:'Avg Score',v:stats.avg_score+'%',c:'#60a5fa'}].map((s,i) => (
                  <div key={s.l} className={'stat-card fade-up fade-d'+i}>
                    <div style={{ position:'absolute', top:-20, right:-20, width:80, height:80, borderRadius:'50%', background:s.c+'08' }} />
                    <div className="label">{s.l}</div>
                    <div style={{ fontSize:32, fontWeight:700, lineHeight:1 }}>{s.v}</div>
                  </div>
                ))}
              </div>

              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:10 }}>
                <h2 style={{ fontSize:18, fontWeight:600 }}>Recent Matches</h2>
                <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                  <button onClick={()=>handleTestRun('quick')} disabled={testRunning} className="btn" style={{ display:'flex', alignItems:'center', gap:5, padding:'7px 14px', background:scanMode==='quick'?'var(--text-dim)':'linear-gradient(135deg,#60a5fa20,#60a5fa10)', border:'1px solid #60a5fa40', borderRadius:8, color:scanMode==='quick'?'var(--text-dim)':'#60a5fa', fontSize:11.5 }}>
                    {scanMode==='quick' ? 'Scanning...' : 'Quick Scan'}
                  </button>
                  <button onClick={()=>handleTestRun('ai')} disabled={testRunning} className="btn" style={{ display:'flex', alignItems:'center', gap:5, padding:'7px 14px', background:scanMode==='ai'?'var(--text-dim)':'linear-gradient(135deg,#fbbf2420,#fbbf2410)', border:'1px solid #fbbf2440', borderRadius:8, color:scanMode==='ai'?'var(--text-dim)':'#fbbf24', fontSize:11.5 }}>
                    {scanMode==='ai' ? 'Analyzing...' : 'AI Analyze Top 25'}
                  </button>
                  <button onClick={()=>handleTestRun('full')} disabled={testRunning} className="btn" style={{ display:'flex', alignItems:'center', gap:5, padding:'7px 14px', background:scanMode==='full'?'var(--text-dim)':'linear-gradient(135deg,#34d39920,#34d39910)', border:'1px solid #34d39940', borderRadius:8, color:scanMode==='full'?'var(--text-dim)':'#34d399', fontSize:11.5 }}>
                    {scanMode==='full' ? 'Running...' : 'Full Scan'}
                  </button>
                  <span style={{ fontSize:10, color:'var(--text-dim)', fontStyle:'italic', fontFamily:"'Source Serif 4',serif" }}>Auto 3x daily</span>
                </div>
              </div>

              {testResult && (
                <div style={{ padding:'12px 18px', marginBottom:16, borderRadius:12, background:testResult.ok?'#34d39910':'#ef444410', border:'1px solid '+(testResult.ok?'#34d39930':'#ef444430'), color:testResult.ok?'#34d399':'#ef4444', fontSize:13, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span>{testResult.ok?'✓':'✗'} {testResult.msg}</span>
                  <button onClick={()=>setTestResult(null)} style={{ background:'none', border:'none', color:'inherit', cursor:'pointer', fontSize:16 }}>×</button>
                </div>
              )}

              {loading ? <div style={{ textAlign:'center', padding:60, color:'var(--text-muted)' }}>Loading...</div>
              : matches.length===0 ? (
                <div className="card" style={{ textAlign:'center', padding:60 }}>
                  <div style={{fontSize:36,marginBottom:12}}>📭</div>
                  <h3>No matches yet</h3>
                  <p style={{color:'var(--text-muted)',fontSize:14,marginTop:6,marginBottom:16}}>Your agent is searching. Matches appear after the next scan.</p>
                  <div style={{ display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>
                    <button onClick={()=>handleTestRun('quick')} disabled={testRunning} className="btn" style={{ padding:'10px 20px', border:'1px solid #60a5fa40', background:'#60a5fa15', color:'#60a5fa', fontSize:13 }}>
                      {scanMode==='quick' ? 'Scanning...' : 'Quick Scan (~30s)'}
                    </button>
                    <button onClick={()=>handleTestRun('ai')} disabled={testRunning} className="btn" style={{ padding:'10px 20px', border:'1px solid #fbbf2440', background:'#fbbf2415', color:'#fbbf24', fontSize:13 }}>
                      {scanMode==='ai' ? 'Analyzing...' : 'AI Analyze Top 25'}
                    </button>
                    <button onClick={()=>handleTestRun('full')} disabled={testRunning} className="btn" style={{ padding:'10px 20px', border:'1px solid #34d39940', background:'#34d39915', color:'#34d399', fontSize:13 }}>
                      {scanMode==='full' ? 'Running...' : 'Full Scan (~2min)'}
                    </button>
                  </div>
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {matches.map((m,i) => {
                    const j = m.jobs || m.job || {};
                    const isSaved = j.id && savedJobs[j.id];
                    const savedStatus = isSaved ? savedJobs[j.id].status : null;
                    return (
                      <div key={m.id} className={'match-card fade-up fade-d'+Math.min(i,4)}>
                        <div style={{ display:'flex', gap:16, alignItems:'flex-start' }}>
                          <ScoreRing score={m.score} />
                          <div style={{ flex:1, cursor:'pointer' }} onClick={()=>{if(j.url && !j.url.startsWith('user-added')){window.open(j.url,'_blank');trackAction('apply_click',m.id);}}}>
                            <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                              <h3 style={{ margin:0, fontSize:16, fontWeight:600 }}>{j.title||'Untitled'}</h3>
                              {m.sent && <Tag color="#34d399">Sent</Tag>}
                              {savedStatus && <Tag color={savedStatus==='applied'?'#fbbf24':savedStatus==='interviewing'?'#60a5fa':savedStatus==='offer'?'#34d399':savedStatus==='rejected'?'#ef4444':'#a78bfa'}>{savedStatus}</Tag>}
                            </div>
                            <div style={{ fontSize:13, color:'var(--text-dim)', marginTop:3, fontFamily:"'Source Serif 4',serif" }}>{j.company}{j.company&&j.location?' · ':''}{j.location}</div>
                            <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
                              {j.salary && <Tag color="#34d399">{j.salary}</Tag>}
                              {j.location?.toLowerCase().includes('remote') && <Tag color="#60a5fa" ghost>Remote</Tag>}
                              <Tag color="#6b6b85" ghost>{timeAgo(m.created_at)}</Tag>
                            </div>
                            {m.ai_summary && <p style={{ margin:'14px 0 0', fontSize:13.5, color:'var(--text-muted)', lineHeight:1.65, fontFamily:"'Source Serif 4',serif", fontStyle:'italic' }}>{m.ai_summary}</p>}
                          </div>
                          <div style={{ display:'flex', flexDirection:'column', gap:6, flexShrink:0 }}>
                            <button onClick={(e)=>{e.stopPropagation();if(j.id)toggleSave(j.id);}} title={isSaved?'Unsave':'Save'} style={{ background:'none', border:'1px solid '+(isSaved?'#fbbf2440':'var(--border)'), borderRadius:8, width:36, height:36, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, color:isSaved?'#fbbf24':'var(--text-dim)', transition:'all 0.2s' }}>
                              {isSaved ? '★' : '☆'}
                            </button>
                            {isSaved && (
                              <select value={savedStatus||'saved'} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updateTrackerStatus(savedJobs[j.id].id, e.target.value);}} style={{ background:'var(--bg)', color:'var(--text-muted)', border:'1px solid var(--border)', borderRadius:6, padding:'4px 2px', fontSize:9, fontFamily:'inherit', cursor:'pointer', textAlign:'center' }}>
                                <option value="saved">Saved</option>
                                <option value="applied">Applied</option>
                                <option value="interviewing">Interview</option>
                                <option value="offer">Offer</option>
                                <option value="rejected">Rejected</option>
                              </select>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>}

            {/* TRACKER TAB */}
            {tab==='tracker' && <>
              {/* Tracker Stats */}
              <div style={{ display:'flex', gap:10, marginBottom:24, flexWrap:'wrap' }}>
                {[{l:'Saved',v:trackerStats.saved,c:'#a78bfa',s:'saved'},{l:'Applied',v:trackerStats.applied,c:'#fbbf24',s:'applied'},{l:'Interviewing',v:trackerStats.interviewing,c:'#60a5fa',s:'interviewing'},{l:'Offers',v:trackerStats.offer,c:'#34d399',s:'offer'},{l:'Rejected',v:trackerStats.rejected,c:'#ef4444',s:'rejected'}].map(s => (
                  <div key={s.l} onClick={()=>setTrackerFilter(trackerFilter===s.s?'all':s.s)} className="stat-card" style={{ cursor:'pointer', flex:1, minWidth:100, border:trackerFilter===s.s?`1px solid ${s.c}60`:'1px solid var(--border)', background:trackerFilter===s.s?s.c+'10':'var(--surface)' }}>
                    <div className="label" style={{color:s.c}}>{s.l}</div>
                    <div style={{ fontSize:28, fontWeight:700, lineHeight:1 }}>{s.v}</div>
                  </div>
                ))}
              </div>

              {/* Add Job Button */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <h2 style={{ fontSize:18, fontWeight:600 }}>{trackerFilter==='all'?'All Tracked Jobs':trackerFilter.charAt(0).toUpperCase()+trackerFilter.slice(1)}</h2>
                <button onClick={()=>setShowAddJob(true)} className="btn" style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', background:'linear-gradient(135deg,#a78bfa20,#a78bfa10)', border:'1px solid #a78bfa40', borderRadius:8, color:'#a78bfa', fontSize:12 }}>
                  + Add Job
                </button>
              </div>

              {/* Tracker List */}
              {trackerJobs.filter(tj => trackerFilter==='all' || tj.status===trackerFilter).length === 0 ? (
                <div className="card" style={{ textAlign:'center', padding:50 }}>
                  <div style={{fontSize:32,marginBottom:10}}>📋</div>
                  <h3 style={{fontSize:16}}>No {trackerFilter==='all'?'tracked':trackerFilter} jobs yet</h3>
                  <p style={{color:'var(--text-muted)',fontSize:13,marginTop:6}}>Star jobs from Matches or add your own.</p>
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {trackerJobs.filter(tj => trackerFilter==='all' || tj.status===trackerFilter).map((tj,i) => {
                    const j = tj.jobs || {};
                    const sc = {saved:'#a78bfa',applied:'#fbbf24',interviewing:'#60a5fa',offer:'#34d399',rejected:'#ef4444'};
                    return (
                      <div key={tj.id} className="match-card fade-up" style={{ borderLeft:`3px solid ${sc[tj.status]||'#a78bfa'}` }}>
                        <div style={{ display:'flex', gap:14, alignItems:'flex-start' }}>
                          <div style={{ flex:1 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                              <h3 style={{ margin:0, fontSize:15, fontWeight:600, cursor:j.url&&!j.url.startsWith('user-added')?'pointer':'default' }} onClick={()=>{if(j.url&&!j.url.startsWith('user-added'))window.open(j.url,'_blank');}}>{j.title||'Untitled'}</h3>
                              <Tag color={sc[tj.status]}>{tj.status}</Tag>
                            </div>
                            <div style={{ fontSize:13, color:'var(--text-dim)', marginTop:3 }}>{j.company}{j.company&&j.location?' · ':''}{j.location}</div>
                            <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                              {j.salary && <Tag color="#34d399">{j.salary}</Tag>}
                              {j.location?.toLowerCase().includes('remote') && <Tag color="#60a5fa" ghost>Remote</Tag>}
                              {tj.applied_date && <Tag color="#6b6b85" ghost>Applied {timeAgo(tj.applied_date)}</Tag>}
                            </div>
                            {tj.notes && <p style={{ margin:'8px 0 0', fontSize:12, color:'var(--text-dim)', fontStyle:'italic' }}>{tj.notes}</p>}
                          </div>
                          <div style={{ display:'flex', gap:6, alignItems:'center', flexShrink:0 }}>
                            <select value={tj.status} onChange={e=>updateTrackerStatus(tj.id, e.target.value)} style={{ background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 8px', fontSize:11, fontFamily:'inherit', cursor:'pointer' }}>
                              <option value="saved">Saved</option>
                              <option value="applied">Applied</option>
                              <option value="interviewing">Interviewing</option>
                              <option value="offer">Offer</option>
                              <option value="rejected">Rejected</option>
                            </select>
                            <button onClick={()=>{api(`/tracker/${tj.id}`,{method:'DELETE'}).then(()=>loadData());}} style={{ background:'none', border:'1px solid #ef444430', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#ef4444' }}>×</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>}

            {/* ADD JOB MODAL */}
            {showAddJob && <AddJobModal onClose={()=>setShowAddJob(false)} onAdded={()=>{setShowAddJob(false);loadData();}} />}

            {/* PROFILE TAB */}
            {tab==='profile' && profile && <ProfileTab profile={profile} setProfile={setProfile} showReupload={showReupload} setShowReupload={setShowReupload} loadData={loadData} />}

            {/* SETTINGS TAB */}
            {tab==='settings' && <SettingsTab profile={profile} setProfile={setProfile} smsTestLoading={smsTestLoading} smsTestResult={smsTestResult} handleSmsTest={handleSmsTest} />}
          </main>
        </div>
      );
    }

    // ── APP ──
    function App() {
      const [user, setUser] = useState(null);
      const [needsResume, setNeedsResume] = useState(false);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = localStorage.getItem('ja_token');
        if (!token) { setChecking(false); return; }
        api('/profile').then(p => { setUser(p); if (!p.profile_complete) setNeedsResume(true); })
          .catch(() => localStorage.removeItem('ja_token'))
          .finally(() => setChecking(false));
      }, []);

      if (checking) return <div className="screen" style={{background:'var(--bg)',color:'var(--text-muted)'}}>Loading...</div>;
      if (!user) return <AuthScreen onAuth={u => { setUser(u); setNeedsResume(true); }} />;
      if (needsResume) return <ResumeUpload onComplete={() => setNeedsResume(false)} />;
      return <Dashboard onLogout={() => { localStorage.removeItem('ja_token'); setUser(null); setNeedsResume(false); }} />;
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
